name: CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build library
        run: dotnet build src/Plugin.Maui.SquircleContainer/Plugin.Maui.SquircleContainer.csproj -c Release

      - name: Pack NuGet
        run: dotnet pack src/Plugin.Maui.SquircleContainer/Plugin.Maui.SquircleContainer.csproj -c Release --no-build -o ./artifacts

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: ./artifacts/*.nupkg

      - name: Push to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
